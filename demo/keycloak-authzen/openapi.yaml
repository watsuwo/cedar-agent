openapi: 3.0.0
info:
  title: cedar-agent (AuthZEN-enabled)
  description: 'Forked Cedar-Agent HTTP server with OpenID Foundation AuthZEN Authorization
    API 1.0 support.


    Two API surfaces:

    - **AuthZEN Access Evaluation API** (`/access/v1/*`, `/.well-known/authzen-configuration`)
    for PDP-style allow/deny decisions.

    - **Cedar management API** (`/v1/*`) to manage policies, entity data and schema,
    plus the native `/v1/is_authorized` evaluation.


    All endpoints except `/health` and `/.well-known/authzen-configuration` accept
    an optional `authorization` API key header when the agent is started with authentication
    enabled.'
  contact:
    name: Source (fork)
    url: https://github.com/watsuwo/cedar-agent
  version: 0.2.0
paths:
  /:
    get:
      operationId: routes_health
      responses:
        '200':
          description: ''
          content:
            text/plain:
              schema:
                type: string
      tags:
      - Health
  /access/v1/evaluation:
    post:
      description: AuthZEN single Access Evaluation.
      operationId: routes_authzen_evaluation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      tags:
      - AuthZEN
  /access/v1/evaluations:
    post:
      description: AuthZEN batch Access Evaluations.
      operationId: routes_authzen_evaluations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationsRequest'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationsResponse'
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      tags:
      - AuthZEN
  /.well-known/authzen-configuration:
    get:
      description: AuthZEN Policy Decision Point metadata. Publicly accessible (no
        auth) so that clients can discover the PDP endpoints.
      operationId: routes_authzen_authzen_configuration
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzenConfiguration'
      tags:
      - AuthZEN
  /v1:
    get:
      operationId: routes_health
      responses:
        '200':
          description: ''
          content:
            text/plain:
              schema:
                type: string
      tags:
      - Health
  /v1/policies:
    get:
      operationId: routes_policies_get_policies
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      tags:
      - Policies
    put:
      operationId: routes_policies_update_policies
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Policy'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Policy'
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
