        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      tags:
