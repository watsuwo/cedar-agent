      - Policies
    put:
      operationId: routes_policies_update_policy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyUpdate'
        required: true
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - ApiKeyAuth: []
      tags:
      - Policies
    delete:
      operationId: routes_policies_delete_policy
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: ''
        '400':
          description: '# 400 Bad Request

            The request given is wrongly formatted or data was missing. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: '# 401 Unauthorized

            The authentication given was incorrect or insufficient. '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
